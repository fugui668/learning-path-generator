{% extends "base.html" %}

{% block title %}错误 {{ code }} — 学习路径生成器{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-icon">
      {% if code == 404 %}🔍{% else %}⚠️{% endif %}
    </div>
    <h1 class="error-code">{{ code }}</h1>
    <p class="error-message">{{ message }}</p>
    {% if code == 404 %}
      <p class="error-hint">您访问的页面不存在，可能已被移除或地址有误。</p>
    {% else %}
      <p class="error-hint">服务器处理请求时发生了错误，请稍后再试。</p>
    {% endif %}
    <a href="{{ url_for('index') }}" class="btn-home">← 返回首页</a>
  </div>
</div>

<style>
.error-page {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 60vh;
  padding: 2rem;
}
.error-card {
  text-align: center;
  background: #fff;
  border-radius: 12px;
  padding: 3rem 4rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  max-width: 480px;
  width: 100%;
}
.error-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
}
.error-code {
  font-size: 5rem;
  font-weight: 700;
  color: #e74c3c;
  margin: 0 0 0.5rem 0;
  line-height: 1;
}
.error-message {
  font-size: 1.4rem;
  font-weight: 600;
  color: #2c3e50;
  margin: 0.5rem 0;
}
.error-hint {
  font-size: 0.95rem;
  color: #7f8c8d;
  margin: 0.75rem 0 2rem 0;
}
.btn-home {
  display: inline-block;
  padding: 0.75rem 2rem;
  background: #3498db;
  color: #fff;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  transition: background 0.2s;
}
.btn-home:hover {
  background: #2980b9;
}
</style>
{% endblock %}
