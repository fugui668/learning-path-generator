<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}学习路径生成器{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="{{ url_for('index') }}">
        🎯 学习路径生成器
        <span class="nav-version">v{{ version }}</span>
      </a>
      <ul class="nav-links">
        <li><a href="{{ url_for('index') }}"
               class="{% if request.endpoint == 'index' %}active{% endif %}">首页</a></li>
        <li><a href="{{ url_for('path_detail') }}"
               class="{% if request.endpoint == 'path_detail' %}active{% endif %}">我的路径</a></li>
        <li><a href="{{ url_for('progress') }}"
               class="{% if request.endpoint == 'progress' %}active{% endif %}">进度打卡</a></li>
        <li><a href="{{ url_for('chart') }}"
               class="{% if request.endpoint == 'chart' %}active{% endif %}">图表</a></li>
      </ul>
    </div>
  </nav>

  <!-- Flash 消息 -->
  <div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
  </div>

  <!-- 主内容 -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <p>🎓 个性化学习路径生成器 &nbsp;·&nbsp; v{{ version }}</p>
  </footer>
</body>
</html>
